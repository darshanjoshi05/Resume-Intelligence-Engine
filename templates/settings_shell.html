{% extends "base.html" %}
{% block content %}

<style>
    .settings-wrap {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 18px;
        align-items: start;
    }

    @media (max-width: 980px) {
        .settings-wrap {
            grid-template-columns: 1fr;
        }
    }

    .settings-nav {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
        position: sticky;
        top: 14px;
        height: fit-content;
    }

    .settings-nav a {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 10px 10px;
        border-radius: 12px;
        text-decoration: none;
        color: var(--muted);
        font-weight: 700;
        border: 1px solid transparent;
    }

    .settings-nav a:hover {
        color: var(--text);
        background: rgba(243, 155, 61, .10);
        border-color: rgba(243, 155, 61, .18);
    }

    .settings-nav a.active {
        color: var(--text);
        background: rgba(243, 155, 61, .14);
        border-color: rgba(243, 155, 61, .25);
    }

    .settings-main {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
    }

    .two {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    @media (max-width: 980px) {
        .two {
            grid-template-columns: 1fr;
        }
    }

    .row {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
    }

    .label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
        font-weight: 700;
        letter-spacing: .2px;
    }

    .input {
        width: 100%;
    }

    .muted {
        color: var(--muted);
    }

    .panel {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 14px;
        background: rgba(255, 255, 255, .20);
    }

    html[data-theme="dark"] .panel {
        background: rgba(20, 24, 22, .55);
    }

    .panel-title {
        font-weight: 800;
        margin-bottom: 10px;
        color: var(--text);
    }

    .btnbar {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 14px;
    }
</style>

<section class="card">
    <div class="row">
        <div>
            <h1 class="h1">{{ title }}</h1>
            <p class="muted">Configure the engine separately from your resume data.</p>
        </div>
    </div>

    {% if saved %}
    <div class="panel" style="border:1px solid rgba(34,197,94,.55);">
        <b>Saved.</b>
    </div>
    {% endif %}

    {% if error %}
    <div class="panel" style="border:1px solid rgba(239,68,68,.65);">
        <b>Error:</b> {{ error }}
    </div>
    {% endif %}

    <div class="settings-wrap">
        <aside class="settings-nav">
            <a href="/settings/profile" class="{% if tab=='profile' %}active{% endif %}">Profile</a>
            <a href="/settings/output" class="{% if tab=='output' %}active{% endif %}">Output Defaults</a>
            <a href="/settings/learning" class="{% if tab=='learning' %}active{% endif %}">Learning</a>
            <a href="/settings/workflow" class="{% if tab=='workflow' %}active{% endif %}">Workflow</a>
        </aside>

        <main class="settings-main">
            {% block settings_content %}{% endblock %}
        </main>
    </div>
</section>

{% endblock %}
