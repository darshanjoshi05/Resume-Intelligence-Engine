{% extends "settings_shell.html" %}
{% block settings_content %}
{% set learning = settings.get('learning', {}) %}

<form method="post" action="/settings/learning/save">
    <div class="panel">
        <div class="panel-title">Learning Controls</div>

        <div class="two">
            <div>
                <div class="label">Learning enabled</div>
                <select class="input" name="enabled">
                    <option value="true" {% if learning.get('enabled', true) %}selected{% endif %}>On</option>
                    <option value="false" {% if not learning.get('enabled', true) %}selected{% endif %}>Off</option>
                </select>
            </div>

            <div>
                <div class="label">Learn from job descriptions</div>
                <select class="input" name="learn_from_jds">
                    <option value="true" {% if learning.get('learn_from_jds', true) %}selected{% endif %}>Yes</option>
                    <option value="false" {% if not learning.get('learn_from_jds', true) %}selected{% endif %}>No</option>
                </select>
            </div>

            <div>
                <div class="label">Confidence threshold (0 to 1)</div>
                <input class="input" type="number" step="0.01" min="0" max="1" name="confidence_threshold"
                    value="{{ learning.get('confidence_threshold', 0.62) }}" />
            </div>
        </div>

        <div class="muted" style="margin-top:10px;font-size:12px;">
            Higher threshold = fewer risky injections. Lower = more aggressive matching.
        </div>
    </div>

    <div class="btnbar">
        <button class="btn primary" type="submit">Save Learning Settings</button>
    </div>
</form>

{% endblock %}
